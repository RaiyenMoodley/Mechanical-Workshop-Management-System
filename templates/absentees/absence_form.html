{% extends 'base.html' %}

{% block title %}Mark Employee Absent - Workshop Manager{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>{{ title }}</h1>
    </div>

    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.employee.id_for_label }}">Employee</label>
                {{ form.employee }}
            </div>
            <div class="form-group">
                <label for="{{ form.date.id_for_label }}">Date</label>
                {{ form.date }}
            </div>
            <div class="form-group">
                <label for="{{ form.notes.id_for_label }}">Notes (optional)</label>
                {{ form.notes }}
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'absentees:absence_calendar' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
