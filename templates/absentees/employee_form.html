{% extends 'base.html' %}

{% block title %}Add Employee - Absentee Manager{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1>{{ title }}</h1>
    </div>

    <div class="form-card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.name.id_for_label }}">Employee Name</label>
                {{ form.name }}
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save</button>
                <a href="{% url 'absentees:employee_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
