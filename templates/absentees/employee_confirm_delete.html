{% extends 'base.html' %}

{% block title %}Delete Employee - Absentee Manager{% endblock %}

{% block content %}
<div class="container">
    <div class="delete-card">
        <h2>Delete Employee</h2>
        <div class="delete-info">
            <p>Are you sure you want to delete <strong>{{ employee.name }}</strong>?</p>
            <p>This will also remove all absence records linked to this employee.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'absentees:employee_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
